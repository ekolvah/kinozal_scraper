name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e . --no-deps  # `kinozal_scraper` package resolvable for -m / mypy

      # Each step delegates to scripts/ci_check.py --only <name>; the check set
      # lives in ci_check's CHECKS registry only. Adding/removing a check there
      # auto-fails tests/test_ci_check.py::TestStepParity until ci.yml matches.
      - name: Check formatting
        run: python scripts/ci_check.py --only format

      - name: Lint
        run: python scripts/ci_check.py --only lint

      - name: Run tests
        run: python scripts/ci_check.py --only pytest

      - name: Dependency audit
        run: python scripts/ci_check.py --only pip-audit

      - name: Dependency audit (dev)
        run: python scripts/ci_check.py --only pip-audit-dev

      - name: Requirements consistency
        run: python scripts/ci_check.py --only requirements

      - name: Type check
        run: python scripts/ci_check.py --only mypy

      - name: Import contracts
        run: python scripts/ci_check.py --only imports

  # Agent-independent backstop for the #319 defect: a PR from an issue-N branch
  # that closes no issue (empty closingIssuesReferences) stays open after merge.
  # open_pr.py makes the right path cheap; this required check makes it mandatory,
  # regardless of how the PR was created. PR-context only, so a separate job (not a
  # ci_check --only step — TestStepParity mirrors that registry).
  pr-link:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # HEAD_REF/PR_NUMBER via env, NOT inline ${{ }}, so a fork branch name can't
      # inject into the shell (github.head_ref is attacker-controllable).
      - name: Verify PR closes its issue
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python -m scripts.verify_pr_link --branch "$HEAD_REF" --pr "$PR_NUMBER"
