name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "issue-*"
      # transition: remove once no open PRs on codex-* (gh pr list) — see #170
      - "codex-*"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      # Each step delegates to scripts/ci_check.py --only <name>; the check set
      # lives in ci_check's CHECKS registry only. Adding/removing a check there
      # auto-fails tests/test_ci_check.py::TestStepParity until ci.yml matches.
      - name: Check formatting
        run: python scripts/ci_check.py --only format

      - name: Lint
        run: python scripts/ci_check.py --only lint

      - name: Run tests
        run: python scripts/ci_check.py --only pytest

      - name: Test coverage doc freshness
        run: python scripts/ci_check.py --only coverage-doc

      - name: Module docstring presence
        run: python scripts/ci_check.py --only headers

      - name: Dependency audit
        run: python scripts/ci_check.py --only pip-audit

      - name: Dependency audit (dev)
        run: python scripts/ci_check.py --only pip-audit-dev

      - name: Requirements consistency
        run: python scripts/ci_check.py --only requirements

      - name: Type check
        run: python scripts/ci_check.py --only mypy
