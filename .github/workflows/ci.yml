name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex-*"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Type check
        run: |
          mapfile -t modules < <(find . -name "*.py" \
            ! -path "./.venv/*" ! -path "./.git/*" ! -path "./__pycache__/*" \
            ! -path "./.claude/*")
          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No modules to type-check; skipping."
          else
            python -m mypy "${modules[@]}"
          fi

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt

      - name: Dependency audit (dev)
        run: python -m pip_audit -r requirements-dev.txt

      - name: Requirements consistency
        run: |
          python - <<'EOF'
          import re, sys
          from pathlib import Path

          def parse_pins(path):
              pins = {}
              for line in Path(path).read_text(encoding="utf-8").splitlines():
                  m = re.match(r'^([a-zA-Z0-9_.\\-\\[\\]]+)==(.+)$', line.strip())
                  if m:
                      name = re.sub(r'\\[.*\\]', '', m.group(1)).lower().replace('-', '_')
                      pins[name] = m.group(2)
              return pins

          req = parse_pins("requirements.txt")
          dev = parse_pins("requirements-dev.txt")
          bad = [(p, req[p], dev[p]) for p in req if p in dev and req[p] != dev[p]]
          if bad:
              print("requirements version mismatch — edit .in files and run pip-compile:")
              for p, rv, dv in bad:
                  print(f"  {p}: requirements.txt={rv}, requirements-dev.txt={dv}")
              sys.exit(1)
          print("requirements versions consistent")
          EOF
