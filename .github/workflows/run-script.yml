name: Run python script
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pure logic tests
        run: python -m pytest tests/ -x

      - name: Run JSON sources pipeline
        run: python json_pipeline.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOP_LIMIT: ${{ vars.GH_TOP_LIMIT }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GEMINI_EXCLUDED_MODELS: ${{ vars.GEMINI_EXCLUDED_MODELS }}

      - name: Run GitHub trending pipeline
        run: python github_trending_pipeline.py
        env:
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GEMINI_EXCLUDED_MODELS: ${{ vars.GEMINI_EXCLUDED_MODELS }}

      - name: Run Steam charts pipeline
        run: python steam_pipeline.py
        env:
          STEAM_TOP_LIMIT: ${{ vars.STEAM_TOP_LIMIT }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}

      - name: Run events pipeline
        run: python events_pipeline.py
        env:
          SOLDOUT_URL: ${{ vars.SOLDOUT_URL }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}

      - name: Run Kinozal pipeline
        run: python kinozal_pipeline.py
        env:
          CREDENTIALS: ${{ secrets.CREDENTIALS }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          API_KEY: ${{ secrets.API_KEY }}
          URLS: ${{ vars.URLS }}

      - name: Run Telegram summarizer
        if: always()
        run: python telegram_summarizer.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.BOT_CHATID }}
          CHANNEL_URL: ${{ vars.CHANNEL_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GEMINI_EXCLUDED_MODELS: ${{ vars.GEMINI_EXCLUDED_MODELS }}
