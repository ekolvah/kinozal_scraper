[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".git",
    ".audit-tmp",
    ".idea",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "pytest-cache-files-*",
    "TelegramChannelSummarizer.py",
    "crypto.py",
    "scraper.py",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]
ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -p no:cacheprovider"

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true
exclude = [
    "^scraper\\.py$",
    "^TelegramChannelSummarizer\\.py$",
    "^crypto\\.py$",
]
