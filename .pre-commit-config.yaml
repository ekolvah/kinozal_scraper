repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(anon\.session\.encrypted|TelegramChannelSummarizer\.py|crypto\.py|scraper\.py|\.github/workflows/run-script\.yml)$
      - id: end-of-file-fixer
        exclude: ^(anon\.session\.encrypted|TelegramChannelSummarizer\.py|crypto\.py|scraper\.py|\.github/workflows/run-script\.yml)$
      - id: check-yaml
      - id: check-toml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^anon\.session\.encrypted$
